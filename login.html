
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | SignBridge</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-wrapper">
    <!-- Logo Section -->
    <div class="logo-section">
      <img src="js/assets/logo.png" alt="SignBridge Logo" class="logo">
      <h1 class="brand-name">SignBridge</h1>
      <p class="brand-tagline">Bridging spoken and sign language with AI</p>
    </div>

    <!-- Login Form -->
    <div class="auth-container">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to your account</p>
      </div>

      <form class="auth-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" id="loginBtn" class="auth-btn">
          <span>Sign In</span>
          <div class="btn-loader" style="display: none;"></div>
        </button>
      </form>

      <div class="auth-footer">
        <p>
          New to SignBridge?
          <a href="signup.html" class="auth-link">Create Account</a>
        </p>
      </div>
    </div>
  </div>

  <!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient(
  "https://objwfboldhhxygbqbfcx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9iandmYm9sZGhoeHlnYnFiZmN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4ODM1NDIsImV4cCI6MjA4NDQ1OTU0Mn0.gWi5hGk-jNdm3yJHHqunvUMLHjFA_aOAjbPMobRQoXM" 
  );

document.querySelector(".auth-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert("Invalid email or password");
    return;
  }

  alert("Login successful!");
  window.location.href = "dashboard.html";
});

</script>
</body>
</html>
